services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-voyage-3.5}
      VECTOR_STORE_PATH: /srv/data/faiss_index
      DEMO_VECTOR_STORE_PATH: /srv/data/demo_index
      CORS_ORIGINS: ${CORS_ORIGINS:-https://aminskenderi.me,https://www.aminskenderi.me}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
    volumes:
      - faiss-data:/srv/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  faiss-data:
