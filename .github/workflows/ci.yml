name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Lint (errors only)
        # Fail the build on real problems (syntax errors, undefined names),
        # not on style. Keeps CI meaningful without churn on formatting.
        run: ruff check . --select E9,F63,F7,F82

      - name: Run tests
        # The suite runs without API keys — LLM and embeddings are faked.
        run: pytest -q
